{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto; display:block;">
    <h2>Edit Book</h2>

    <form method="POST" action="{{ url_for('edit_post', book_id=book['bookId']) }}">
        <input type="hidden" name="bookId" value="{{ book['bookId'] }}">

        <label>Title:</label><br>
        <input type="text" name="title" value="{{ book['title'] }}" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" value="{{ book['author'] }}" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" value="{{ book['isbn'] }}" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ book['price'] }}" required><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" value="{{ book['image'] }}" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required>
            {% for category in categories %}
                <option value="{{ category['categoryId'] }}" {% if category['categoryId'] == book['categoryId'] %}selected{% endif %}>
                    {{ category['categoryName'] }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" required>
            <option value="0" {% if book['readNow'] == 0 %}selected{% endif %}>Not Available</option>
            <option value="1" {% if book['readNow'] == 1 %}selected{% endif %}>Available Now</option>
        </select><br><br>

        <button type="submit">Save</button>
        <a href="{{ url_for('read_books') }}">Cancel</a>

    </form>
</main>
{% endblock %}
