{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto; display:block;">
    <h2>Create Book</h2>

    <form method="POST" action="{{ url_for('create_post') }}">
        <label>Title:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required>
            {% for category in categories %}
                <option value="{{ category['categoryId'] }}">
                    {{ category['categoryName'] }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" required>
            <option value="0">Not Available</option>
            <option value="1">Available Now</option>
        </select><br><br>

        <button type="submit">Submit</button>
        <a href="{{ url_for('read_books') }}">Cancel</a>
    </form>
</main>
{% endblock %}
